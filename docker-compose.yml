services:
  pagila-db:
    image: ghcr.io/mm-97/pagila-ready:latest
    container_name: pagila-db
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - 5432
    ports:
      - 5432:5432

  pagila-be:
    build:
      context: ./pagilab
      dockerfile: Dockerfile
    container_name: pagila-be
    working_dir: /app
    volumes:
      - ./pagilab:/app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      
    command: >
      java
      -cp /app/build/resources/main:/app/build/classes/java/main:/app/build/docker-libs/*
      org.mm97.pagilab.PagilabApplication
    depends_on:
      - pagila-db

  pagila-fe:
    build:
      context: ./pagilafe
      dockerfile: Dockerfile
    container_name: pagila-fe
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./pagilafe:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - pagila-be

volumes:
  pgdata: